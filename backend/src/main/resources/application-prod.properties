# 1. Datasource Configuration (Production DB: 192.168.1.4)
spring.datasource.url=jdbc:sqlserver://192.168.1.4:1433;databaseName=ASSETS;encrypt=false
# ⚠️ 請在正式環境確認帳號密碼是否與測試機相同，建議不同
spring.datasource.username=popchingsa
spring.datasource.password=P0Pch!ng
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# 2. JPA Configuration (Production 安全設定)
# 正式環境強烈建議關閉 show-sql (避免 Log 暴增影響效能)
spring.jpa.show-sql=false
# 正式環境絕對禁止 ddl-auto 更新表結構，防止資料庫被意外覆蓋或清空
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=false

# 3. Server & App 設定
server.port=8081
# ⚠️ JWT Secret 建議在 Windows Server 正式機上透過系統環境變數 (Environment Variables) 注入
app.jwt.secret=${JWT_SECRET:ThisIsASecretKeyForJWTAuthThatMustBeLongEnoughToBeSecure}
app.jwt.expiration-ms=86400000
